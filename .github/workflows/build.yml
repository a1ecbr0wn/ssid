---
name: CI Build

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.rs"
      - "src/*"
      - "Cargo.*"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "src/*"
      - "Cargo.*"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

env:
  RUSTFLAGS: "--deny warnings"

jobs:
  build:
    name: CI Build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain setup
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --target ${{ matrix.target }}
